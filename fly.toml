# Fly.io config for the "filmowo" app (https://filmowo.fly.dev).
#
# Near-cheapest setup: one always-on shared-cpu-1x machine (~$2/mo). We keep one
# machine running rather than scaling to zero so Fly's hosted Grafana
# (fly-metrics.net) has something to scrape — it only collects metrics from
# RUNNING machines, so a scale-to-zero app leaves the default platform
# dashboards (CPU/RAM/network) empty. Staying warm also means wakes never pay
# the ~40-60s Litestream DB restore cold start. The DB setup is unchanged from
# Render — SQLite on the machine's ephemeral disk, made durable by Litestream
# streaming to Cloudflare R2 and restoring on boot (see litestream.yml +
# docker-entrypoint.sh). No Fly volume is provisioned on purpose; durability
# lives in R2.
app = "filmowo"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/recommend.db"
  BASE_URL = "https://filmowo.fly.dev"

[http_service]
  internal_port = 9002
  force_https = true
  # Keep one machine always running (min_machines_running = 1) so Fly keeps
  # scraping platform metrics into Grafana and the app stays warm. auto_stop is
  # left as "suspend" so any EXTRA machines spun up under load suspend (saving
  # full RAM+disk state, resuming in ~1s) rather than fully stopping; the
  # primary machine never drops below the minimum, so it never pays the
  # ~40-60s Litestream DB restore that a full stop+restart would.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    # First boot (and any rare full stop) restores the DB from R2, which takes
    # ~40s; keep the grace longer than that so the check doesn't flap on boot.
    grace_period = "60s"
    interval = "15s"
    method = "get"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

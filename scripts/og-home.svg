<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Brand palette mirrors public/styles.css custom properties: bg, panel, accent, fg, muted. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151c"/>
      <stop offset="1" stop-color="#0b0e13"/>
    </linearGradient>
    <linearGradient id="poster" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252b35"/>
      <stop offset="1" stop-color="#171b22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative poster grid on the right, evoking the recommendation cards. -->
  <g opacity="0.85">
    <rect x="760"  y="92"  width="120" height="180" rx="12" fill="url(#poster)" stroke="#2a3038"/>
    <rect x="900"  y="64"  width="120" height="180" rx="12" fill="url(#poster)" stroke="#2a3038"/>
    <rect x="1040" y="92"  width="120" height="180" rx="12" fill="url(#poster)" stroke="#2a3038"/>
    <rect x="760"  y="300" width="120" height="180" rx="12" fill="url(#poster)" stroke="#2a3038"/>
    <rect x="900"  y="272" width="120" height="180" rx="12" fill="#f5c518" stroke="#f5c518"/>
    <rect x="1040" y="300" width="120" height="180" rx="12" fill="url(#poster)" stroke="#2a3038"/>
    <!-- A gold star badge on the highlighted card. -->
    <path d="M960 338 l9.5 19.3 21.3 3.1 -15.4 15 3.6 21.2 -19-10 -19 10 3.6 -21.2 -15.4 -15 21.3 -3.1 z" fill="#11151c"/>
  </g>

  <!-- Clapboard mark. -->
  <g transform="translate(96,150)">
    <rect x="0" y="22" width="72" height="50" rx="6" fill="#1f242d" stroke="#2a3038"/>
    <g transform="rotate(-8 36 22)">
      <rect x="-2" y="6" width="76" height="20" rx="4" fill="#f5c518"/>
      <rect x="6"  y="6" width="10" height="20" fill="#11151c" transform="skewX(-12)"/>
      <rect x="26" y="6" width="10" height="20" fill="#11151c" transform="skewX(-12)"/>
      <rect x="46" y="6" width="10" height="20" fill="#11151c" transform="skewX(-12)"/>
    </g>
  </g>

  <!-- Wordmark + tagline. -->
  <text x="184" y="218" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700" fill="#e6e9ef">recommend</text>
  <text x="98" y="300" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="600" fill="#f5c518">what to watch tonight</text>

  <!-- Supporting copy. -->
  <text x="98" y="372" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#8b94a3">Personalised film &amp; TV picks across the streaming</text>
  <text x="98" y="412" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#8b94a3">services you actually have. Rate, discover, build</text>
  <text x="98" y="452" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#8b94a3">your watchlist.</text>

  <!-- Rating chips, echoing the app's score badges. -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600">
    <rect x="98"  y="498" width="116" height="44" rx="22" fill="#171b22" stroke="#2a3038"/>
    <text x="156" y="526" fill="#f5c518" text-anchor="middle">★ IMDb</text>
    <rect x="226" y="498" width="170" height="44" rx="22" fill="#171b22" stroke="#2a3038"/>
    <text x="311" y="526" fill="#4ade80" text-anchor="middle">Your taste</text>
    <rect x="408" y="498" width="150" height="44" rx="22" fill="#171b22" stroke="#2a3038"/>
    <text x="483" y="526" fill="#e6e9ef" text-anchor="middle">Watchlist</text>
  </g>
</svg>

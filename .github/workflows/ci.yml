name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Safari/WebKit at an iPad viewport — catches iOS-specific stacking/layout bugs
  # the Chromium run can't (e.g. the sign-in overlay painting under onboarding).
  # Only the login-overlay spec runs here (see playwright.config.js webkit-ipad).
  e2e-safari:
    name: Playwright e2e (iPad Safari)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps webkit
      - run: npm run test:e2e -- --project=webkit-ipad
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-safari
          path: playwright-report/
          retention-days: 7

  # Deploy gate: only fires on a push to main, and only after BOTH test jobs
  # succeed, so no untested commit ever ships. Builds and deploys the Docker
  # image to Fly.io (app "filmowo"). This is the only path to production.
  # Secrets (repo → Settings → Secrets → Actions):
  #   FLY_API_TOKEN — an app-scoped Fly deploy token (`fly tokens create deploy -a filmowo`)
  deploy:
    name: Deploy to Fly
    needs: [unit, e2e, e2e-safari]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN not set — skipping deploy."
            exit 0
          fi
          echo "Tests passed — deploying filmowo to Fly…"
          flyctl deploy --remote-only --ha=false

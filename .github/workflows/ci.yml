name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Deploy gate: only fires on a push to main, and only after BOTH test jobs
  # succeed, so no untested commit ever ships. Triggers a deploy through the
  # Render API. Render's own deploy-on-push is disabled in render.yaml, making
  # this the only path to production.
  # Secrets (repo → Settings → Secrets → Actions):
  #   RENDER_API_KEY     — a Render API key (rnd_…)
  #   RENDER_SERVICE_ID  — the service id, e.g. srv-…
  deploy:
    name: Deploy to Render
    needs: [unit, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_SERVICE_ID not set — skipping deploy."
            exit 0
          fi
          echo "Tests passed — triggering Render deploy for $RENDER_SERVICE_ID…"
          code=$(curl -fsS -o /dev/null -w '%{http_code}' \
            -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Render API responded $code"
          # Render returns 202 (Accepted) on a successful deploy create; accept any 2xx.
          case "$code" in 2??) ;; *) echo "::error::Render deploy request failed ($code)"; exit 1;; esac
          echo "Render deploy triggered."

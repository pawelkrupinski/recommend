# Canonical definition of Filmowo.xcodeproj — the checked-in .xcodeproj is
# generated from this with `xcodegen generate` (run from ios/). CI builds the
# generated project directly, so it needs no XcodeGen. Regenerate whenever this
# file changes; see ios/README.md.
name: Filmowo
options:
  bundleIdPrefix: pl.filmowo
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2" # 1 = iPhone, 2 = iPad — universal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
targets:
  Filmowo:
    type: application
    platform: iOS
    sources:
      - path: Filmowo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.filmowo.Filmowo
        INFOPLIST_FILE: Filmowo/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
  FilmowoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FilmowoTests
    dependencies:
      - target: Filmowo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.filmowo.FilmowoTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Filmowo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Filmowo"
        BUNDLE_LOADER: "$(TEST_HOST)"
  FilmowoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FilmowoUITests
    dependencies:
      - target: Filmowo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.filmowo.FilmowoUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Filmowo
schemes:
  Filmowo:
    build:
      targets:
        Filmowo: all
        FilmowoTests: [test]
        FilmowoUITests: [test]
    test:
      targets:
        - FilmowoTests
        - FilmowoUITests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Deploy gate: only fires on a push to main, and only after BOTH test jobs
  # succeed. Triggers Render via a deploy hook so no untested commit ever ships.
  # Setup: in Render → service → Settings → Deploy Hook, copy the URL into a
  # GitHub Actions secret named RENDER_DEPLOY_HOOK_URL. (Render auto-deploy is
  # turned off in render.yaml so this is the only path to production.)
  deploy:
    name: Deploy to Render
    needs: [unit, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy."
            exit 0
          fi
          echo "Tests passed — triggering Render deploy…"
          curl -fsSL -X POST "$HOOK" > /dev/null
          echo "Render deploy triggered."

name: Android

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

# A newer push to the same ref cancels the older run mid-flight.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

# Single lane, mirroring the movies app: Linux runner, JDK 17 (AGP 9 needs 17+),
# the preinstalled Android SDK + the Gradle wrapper. Runs the JVM unit suite
# (Compose/Robolectric tests run here too — no emulator), publishes the JUnit
# report, then assembles the debug APK and the R8-minified release APK + AAB and
# ships them as workflow artifacts. Release signing / Play publishing are left
# out until a keystore exists, so the release build is unsigned.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # platform-tools only (NOT the default `tools`, which drags in the flaky
      # emulator download); this JVM-only lane never needs an emulator.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'android/app/build/test-results/testDebugUnitTest/*.xml'
          check_name: Android unit tests
          detailed_summary: true
          include_passed: false

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: filmowo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Assemble release APK + AAB (unsigned)
        env:
          FILMOWO_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: filmowo-release-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Upload release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: filmowo-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

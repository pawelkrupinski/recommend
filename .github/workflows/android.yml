name: Android

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

# A newer push to the same ref cancels the older run mid-flight.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

# Single lane, mirroring the movies app: Linux runner, JDK 17 (AGP 9 needs 17+),
# the preinstalled Android SDK + the Gradle wrapper. Runs the JVM unit suite
# (Compose/Robolectric tests run here too — no emulator) then assembles the debug
# APK and ships it as a workflow artifact. Release signing / Play publishing are
# intentionally omitted until a keystore exists.
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: filmowo-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

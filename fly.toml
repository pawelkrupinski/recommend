# Fly.io config for the "filmowo" app (https://filmowo.fly.dev).
#
# Cheapest viable setup: one shared-cpu-1x machine that auto-stops to zero when
# idle, so you only pay while it's actually serving requests. The DB setup is
# unchanged from Render — SQLite on the machine's ephemeral disk, made durable
# by Litestream streaming to Cloudflare R2 and restoring on boot (see
# litestream.yml + docker-entrypoint.sh). No Fly volume is provisioned on
# purpose; durability lives in R2, which keeps this the cheapest option.
app = "filmowo"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/recommend.db"
  BASE_URL = "https://filmowo.fly.dev"

[http_service]
  internal_port = 9002
  force_https = true
  # Scale toward zero when idle, but SUSPEND rather than stop: a suspended
  # machine saves its full RAM+disk state and resumes in ~1s without re-running
  # the entrypoint, so waking does NOT pay the ~40s Litestream DB restore that a
  # full stop+restart does (the SQLite file stays warm on the resumed disk).
  # Idle cost is just the rootfs storage — still the cheapest practical setup.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    # First boot (and any rare full stop) restores the DB from R2, which takes
    # ~40s; keep the grace longer than that so the check doesn't flap on boot.
    grace_period = "60s"
    interval = "15s"
    method = "get"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

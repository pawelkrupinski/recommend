# Render Blueprint for the "recommend" web app.
# Docs: https://render.com/docs/blueprint-spec
#
# Runs on the FREE plan: no persistent disk. Durability comes from Litestream,
# which streams the SQLite DB to S3-compatible object storage (Cloudflare R2 /
# Backblaze B2, both free) and restores it on boot. See litestream.yml + DEPLOY.md.
services:
  - type: web
    name: filmowo
    runtime: docker
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Non-secret, value provided here.
      - key: NODE_ENV
        value: production
      # DB lives on the container's ephemeral disk; Litestream makes it durable.
      - key: DB_PATH
        value: /data/recommend.db
      # BASE_URL must be the public Render URL (e.g. https://recommend.onrender.com).
      # It is used to build the OAuth callback URLs, so it must match the value
      # registered with the Google/Facebook OAuth apps.
      - key: BASE_URL
        sync: false
      # Secrets: set these in the Render dashboard (Environment tab).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: APPLICATION_SECRET
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: ADMIN_ALLOWLIST
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: TRAKT_KEY
        sync: false
      # --- Litestream (DB replication to object storage) ---
      # Non-secret config; values vary per bucket so set them in the dashboard.
      - key: LITESTREAM_BUCKET
        sync: false
      - key: LITESTREAM_ENDPOINT
        sync: false
      - key: LITESTREAM_REGION
        sync: false
      # Object-storage credentials (secret).
      - key: LITESTREAM_ACCESS_KEY_ID
        sync: false
      - key: LITESTREAM_SECRET_ACCESS_KEY
        sync: false
